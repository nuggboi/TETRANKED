<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

      rel="stylesheet"
    />

    <script src="https://www.gstatic.com/firebasejs/12.16.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/12.16.0/firebase-database-compat.js"></script>

        authDomain: "tetranked-49405.firebaseapp.com",

  </head>
  <body>
    <main class="app-shell">
      <section class="hero">
        <div class="brand-block">
          <h1>Tetranked</h1>
        </div>
      </section>

      <section class="game-panel">
        <div class="board-card">
          <canvas id="board" width="300" height="600"></canvas>
          <div id="overlay" class="overlay visible">
            <div class="overlay-card">
              <h2 id="overlay-title">Choose a mode</h2>
              <p id="overlay-copy">
                Pick Classic, Dig, or Mini, then press Start.
              </p>
              <div class="mode-picker" id="modePicker">
                <button
                  class="mode-btn active"
                  type="button"
                  data-mode="classic"
                >
                  Classic
                </button>
                <button class="mode-btn" type="button" data-mode="dig">
                  Dig
                </button>
                <button class="mode-btn" type="button" data-mode="mini">
                  Mini
                </button>
              </div>
            </div>
          </div>
        </div>

        <aside class="side-panel">
          <div class="stat-card">
            <h2>Score</h2>
            <div id="score" class="value">0</div>
          </div>
          <div class="stat-card">
            <h2>Lines</h2>
            <div id="lines" class="value">0</div>
          </div>
          <div class="stat-card">
            <h2>Level</h2>
            <div id="level" class="value">1</div>
          </div>
          <div class="stat-card">
            <h2>Best</h2>
            <div id="best" class="value">0</div>
          </div>

          <div class="stat-card preview-card">
            <h2>Next</h2>
            <canvas id="next" width="180" height="180"></canvas>
          </div>

          <div class="controls-card">
            <button id="startBtn">Start</button>
            <button id="pauseBtn">Pause</button>
            <button id="restartBtn">Restart</button>
          </div>

          <div class="controls-card leaderboard-card">
            <label class="player-name-field" for="playerName">
              <span>Name</span>
              <input id="playerName" maxlength="16" placeholder="Player" />
            </label>
            <div id="leaderboardStatus" class="leaderboard-status">
              Loading leaderboard…
            </div>
            <ol id="leaderboardList" class="leaderboard-list"></ol>
          </div>

          <div class="controls-card compact">
            <p><strong>Controls</strong></p>
            <ul>
              <li>← → Move</li>
              <li>Z Rotate</li>
              <li>↓ Soft drop</li>
              <li>X Hard drop</li>
              <li>P Pause</li>
            </ul>
          </div>
        </aside>
      </section>
    </main>

    <script src="script.js?v=20260712-3"></script>
  </body>
</html>
